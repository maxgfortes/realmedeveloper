<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover"/>
  <title>RealMe</title>
  <link rel="icon" href="./src/icon/icon.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <meta name="theme-color" content="#0f0f0f">
  <link rel="stylesheet" href="../src/styles/base.css">
  <link rel="stylesheet" href="../src/styles/root.css">
  <meta property="og:title" content="RealMe">
  <meta property="og:description" content="Entre no RealMe ainda hoje e seja você mesmo!">
  <meta property="og:url" content="https://maxgfortes.github.io/realme/PF.html">
  <meta property="og:image" content="https://maxgfortes.github.io/realme/src/icon/share_icon.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="https://i.postimg.cc/7PfNb8TT/share-icon.png">
</head>
<style>
    .error-area {
        height: 100vh;
        width: 100vw;
        background-color:var(--bg-primary);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .text-area {
        text-align: center;
    }

    .error-title {
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        padding: 6px;
    }

    .error-sub {
        color: #aaa;
        font-size: 1rem;
        padding: 6px;
    }

    .btn-area {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .home-btn {
        background-color: var(--primary-btn);
        padding: 12px 32px;
        text-decoration: none;
        font-weight: bold;
        color: #fff;
        border-radius: 10px;
    }

    .error-box {
        max-width: 600px;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
</style>
<body>
    <main class="error-area">
        <div class="error-box">
            <div class="text-area">
                <div class="error-title">404</div>
                <div class="error-sub">a pagina que você esta procurando não existe</div>
            </div>
            <div class="btn-area">
                <a href="feed.html" class="home-btn">Voltar ao Inicio</a>
            </div>
        </div>
    </main>
</body>
</html>
