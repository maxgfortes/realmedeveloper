  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* ================= BODY ================= */
body {
  color: #dbdbdb;
  min-height: 100vh;
  width: 100%;
  overflow: hidden;
  display: flex;
  justify-content: center;
}

/* ================= MAIN ================= */
.main {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* ================= GREETING PC ================= */
.greeting-pc {
  width: 50%;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ================= FORM SECTION ================= */
.form-section {
  width: 50%;
  min-height: 100vh;
  overflow-y: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  scrollbar-width: thin;
  scrollbar-color: #4A90E2 transparent;
}

.form-section::-webkit-scrollbar {
  width: 8px;
}

.form-section::-webkit-scrollbar-thumb {
  background: #4A90E2;
  border-radius: 10px;
}

/* ================= CONTAINER ================= */
.container {
  width: 100%;
  max-width: 420px;
  padding: 30px 40px;
}

/* ================= TITLES ================= */
h1 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 2rem;
  font-weight: normal;
}

.logo {
  background: #4A90E2;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  color: transparent;
}

/* ================= FORM ================= */
form {
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 2vh;
}

label {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 5px;
  font-weight: 600;
}

input[type="email"],
input[type="password"] {
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: #ddd;
  font-size: 15px;
  outline: none;
  width: 100%;
}

input:-webkit-autofill {
  box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
  -webkit-text-fill-color: #ddd !important;
}


input::placeholder {
  color: #555;
}

input:focus {
  background: #1a1a1a;
  color: #fff;
}

/* ================= BUTTON ================= */
.entrarBtn {
  margin-top: 10px;
background: #405DE6;
  color: #fff;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}

/* ================= FORGOT PASSWORD ================= */
.forgot-password {
  display: flex;
  justify-content: flex-end;
}

.forgot-password button {
  background: transparent;
  border: none;
  color: #777;
  font-size: 14px;
  cursor: pointer;
}

/* ================= LINK ================= */
.link {
  text-align: center;
  margin-top: 20px;
  font-size: 0.9rem;
}

.link a {
  color: #405DE6;
  font-weight: bold;
  text-decoration: none;
}

/* ================= MOBILE ================= */
@media (max-width: 780px) {
  body {
    overflow: hidden;
    position: fixed;
    padding: 0;
  }

  .main {
    flex-direction: column;
  }

  .greeting-pc {
    display: none;
  }

  .form-section {
    width: 100%;
    min-height: 100vh;
  }

  .container {
    padding: 20px;
  }
}

    
  </style>
</head>
<body>

  <div class="main">
    <div class="greeting-pc">
    </div>  
    <div class="form-section">
      <div class="container">
        <div class="mobilelogo">
          <h1 class="login-mobile">Fazer Login no <span class="logo">RealMe</span></h1>
        </div>
        <form>
          <div>
            <label for="email">Email</label>
              <input type="email" id="emaillog" name="email" placeholder="Email" required autocomplete="off" autofocus="off" />
            </div>
          <div>
            <label for="senha">Senha</label>
            <input type="password" id="passwordlog" name="senha" placeholder="Senha" required autocomplete="off" autofocus="off"/>
          </div>
          <div class="forgot-password"><div></div><button>esqueceu a senha?</button></div>
          <button class="entrarBtn" type="submit">Entrar</button>
        </form>
        <div class="link">
          <p>Ainda não tem conta? <a href="register.html">Criar Conta</a></p>
        </div>
      </div>
    </div>
  </div>


</body>
