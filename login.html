<html lang="pt-br">
<head>

<link rel="icon" href="../public/img/icon.png" type="image/png" />
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="RealMe" />
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="screen-orientation" content="portrait">
<meta name="x5-orientation" content="portrait">
<link rel="apple-touch-icon" href="../public/img/icon.png" />
<link rel="icon" href="./src/icon/icon.png" type="image/png" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="../src/styles/root.css" />
<link rel="stylesheet" href="../src/styles/base.css" />
<link rel="stylesheet" href="../src/styles/login.css" />
  <meta property="og:title" content="RealMe">
  <meta property="og:description" content="Entre no RealMe ainda hoje e seja você mesmo!">
  <meta property="og:url" content="https://maxgfortes.github.io/realme/PF.html">
  <meta property="og:image" content="https://maxgfortes.github.io/realme/src/icon/share_icon.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="https://i.postimg.cc/7PfNb8TT/share-icon.png">
</head>
<body>
  <div class="main">
    <div class="img-area">
      <img src="../public/img/conections.png" alt="conections">
    </div>
    <div class="step1">
      <div class="create-area">
      <div class="info-area1">
        <div class="logo-area"><p>Faça login no <span>RealMe</span></p></div>
      </div>
        <form>
        <div class="inputs-area">
          <div class="input">
            <label for="email">Email</label>
            <input type="email" id="emaillog" name="email" placeholder="Email" required autocomplete="off" autofocus="off" />
          </div>
          <div class="input">
            <label for="senha">Senha</label>
            <input type="password" id="passwordlog" name="senha" placeholder="Senha" required autocomplete="off" autofocus="off"/>
          </div>
        </div>
        <div class="btn-area">
          <button  type="submit">Entrar</button>
        </div>
      </form>
      </div>
      <div class="more">
        <div class="forgot-password"><button>esqueceu a senha?</button></div>
        <div class="alert1">Ainda não tem conta? <a href="register.html">Criar Conta</a></div>
      </div>
    </div>
  </div>
</body>
<script type="module" src="../src/js/pages/signup.js"></script>
</html>
