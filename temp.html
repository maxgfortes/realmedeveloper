<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Simples</title>

<style>
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .box {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #e8ff47;
    font-weight: bold;
    cursor: pointer;
  }

  #title {
    font-size: 14px;
    opacity: 0.8;
    text-align: center;
  }
</style>
</head>

<body>

<div class="box">
  <input id="url" placeholder="Cole link ou ID do YouTube">
  <button onclick="toggle()">Tocar</button>
  <div id="title">—</div>
</div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let videoId = '';
let playing = false;

// ✅ Conversor melhorado
function extractId(url) {
  url = url.trim();

  const patterns = [
    /v=([A-Za-z0-9_-]{11})/,
    /youtu\.be\/([A-Za-z0-9_-]{11})/,
    /embed\/([A-Za-z0-9_-]{11})/,
    /shorts\/([A-Za-z0-9_-]{11})/,
    /^([A-Za-z0-9_-]{11})$/ // só ID
  ];

  for (let p of patterns) {
    const match = url.match(p);
    if (match) return match[1];
  }

  return null;
}

function createPlayer(id) {
  player = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: id,
    playerVars: { autoplay: 0, controls: 0 },
    events: {
      onReady: () => {
        fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
          .then(r => r.json())
          .then(d => {
            document.getElementById('title').textContent = d.title || 'YouTube';
          })
          .catch(() => {
            document.getElementById('title').textContent = 'YouTube';
          });
      }
    }
  });
}

function toggle() {
  const url = document.getElementById('url').value;

  // primeira vez
  if (!player) {
    const id = extractId(url);
    if (!id) return alert('URL inválida');

    videoId = id;
    createPlayer(id);

    setTimeout(() => player.playVideo(), 500);
    playing = true;
    return;
  }

  if (playing) {
    player.pauseVideo();
  } else {
    player.playVideo();
  }

  playing = !playing;
}

// enter também funciona
document.getElementById('url').addEventListener('keydown', e => {
  if (e.key === 'Enter') toggle();
});
</script>

</body>
</html>
