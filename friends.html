<script>
        const users = [

        ];

        class FriendsCarousel {
            constructor() {
                this.currentIndex = 0;
                this.users = users;
                this.cardsWrapper = document.getElementById('cardsWrapper');
                this.indicators = document.getElementById('indicators');
                this.isTransitioning = false;
                
                this.init();
            }

            init() {
                this.createCards();
                this.createIndicators();
                this.bindEvents();
                this.updateDisplay();
            }

            createCards() {
                this.cardsWrapper.innerHTML = '';
                this.users.forEach((user, index) => {
                    const card = document.createElement('div');
                    card.className = 'friend-card';
                    card.innerHTML = `
                        <div class="card-content">
                            <div class="card-media">
                              <img src="${user.image}" alt="${user.name}" class="card-banner">
                              <img src="${user.image}" alt="${user.name}" class="card-image">
                            </div>
                            <div class="card-info">
                                <div class="card-name">${user.name}</div>
                                <div class="card-username">${user.username}</div>
                            </div>
                            <a href="${user.profile}" class="view-profile-btn"><p>Ver Perfil</p>
                            </a>
                        </div>
                    `;
                    card.addEventListener('click', (e) => {
                        if (!e.target.closest('.view-profile-btn')) {
                            this.goToSlide(index);
                        }
                    });
                    this.cardsWrapper.appendChild(card);
                });
            }

            createIndicators() {
                this.indicators.innerHTML = '';
                this.users.forEach((_, index) => {
                    const indicator = document.createElement('div');
                    indicator.className = 'indicator';
                    if (index === 0) indicator.classList.add('active');
                    indicator.addEventListener('click', () => {
                        this.goToSlide(index);
                    });
                    this.indicators.appendChild(indicator);
                });
            }

            updateDisplay() {
                const cards = this.cardsWrapper.children;
                const totalCards = cards.length;

                Array.from(cards).forEach(card => {
                    card.classList.remove('center', 'left', 'right', 'far-left', 'far-right', 'hidden');
                });

                Array.from(cards).forEach((card, index) => {
                    const relativePos = this.getRelativePosition(index, this.currentIndex, totalCards);
                    switch (relativePos) {
                        case 0: card.classList.add('center'); break;
                        case 1: card.classList.add('right'); break;
                        case -1: card.classList.add('left'); break;
                        case 2: card.classList.add('far-right'); break;
                        case -2: card.classList.add('far-left'); break;
                        default: card.classList.add('hidden'); break;
                    }
                });

                const indicatorElements = this.indicators.children;
                Array.from(indicatorElements).forEach((indicator, index) => {
                    indicator.classList.toggle('active', index === this.currentIndex);
                });
            }

            getRelativePosition(cardIndex, currentIndex, totalCards) {
                let diff = cardIndex - currentIndex;
                if (diff > totalCards / 2) {
                    diff -= totalCards;
                } else if (diff < -totalCards / 2) {
                    diff += totalCards;
                }
                return diff;
            }

            goToSlide(index) {
                if (this.isTransitioning || index === this.currentIndex) return;
                this.isTransitioning = true;
                this.currentIndex = index;
                this.updateDisplay();
                setTimeout(() => {
                    this.isTransitioning = false;
                }, 400);
            }

            next() {
                this.currentIndex = (this.currentIndex + 1) % this.users.length;
                this.updateDisplay();
            }

            prev() {
                this.currentIndex = (this.currentIndex - 1 + this.users.length) % this.users.length;
                this.updateDisplay();
            }

            bindEvents() {
                document.getElementById('nextBtn').addEventListener('click', () => this.next());
                document.getElementById('prevBtn').addEventListener('click', () => this.prev());
                document.addEventListener('keydown', (e) => {
                    if (document.getElementById('carouselView').classList.contains('active')) {
                        if (e.key === 'ArrowRight') this.next();
                        if (e.key === 'ArrowLeft') this.prev();
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('');

            const filterBtn = document.getElementById('filterBtn');
            const optionBar = document.querySelector('.option-bar');
            const overlay = document.querySelector('.sidebar-overlay');
            const closeOptionsBtn = document.getElementById('closeOptionsBtn');

            if (filterBtn && optionBar && overlay) {
                filterBtn.addEventListener('click', () => {
                    optionBar.classList.add('open');
                    overlay.classList.add('show');
                });

                overlay.addEventListener('click', () => {
                    optionBar.classList.remove('open');
                    overlay.classList.remove('show');
                });
            }

            if (closeOptionsBtn) {
                closeOptionsBtn.addEventListener('click', () => {
                    optionBar.classList.remove('open');
                    overlay.classList.remove('show');
                });
            }

            const userLinks = document.querySelectorAll('.user');
            userLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const username = link.getAttribute('data-username');
                    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                    const url = isMobile ? `profile.html?username=${username}` : `profile.html?username=${username}`;
                    window.location.href = url;
                });
            });

            const userImages = document.querySelectorAll('.user img');
            userImages.forEach(img => {
                img.onerror = function() {
                    this.src = '../public/img/default.jpg';
                };
            });
        });

function carregarFotoPerfil() {
  const navPic = document.getElementById('nav-pic'); 

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userId = user.uid; 
      try {
        const userMediaRef = doc(db, `users/${userId}/user-infos/user-media`);
        const userMediaSnap = await getDoc(userMediaRef);

        if (userMediaSnap.exists()) {
          const userPhoto = userMediaSnap.data().userphoto || '../public/img/default.jpg';
          navPic.src = userPhoto; 
        } else {
          console.warn('Foto de perfil não encontrada. Usando a padrão.');
          navPic.src = '../public/img/default.jpg';
        }

        try { if (userId) registerForPushNotifications(userId); } catch(e) { console.warn('Falha ao registrar push:', e); }
      } catch (error) {
        console.error('Erro ao carregar a foto de perfil:', error);
        navPic.src = '../public/img/default.jpg'; 
      }
    } else {
      console.warn('Usuário não autenticado.');
      navPic.src = '../public/img/default.jpg'; 
    }
  });
}

<script type="module">

function getProfileUrl(userId) {
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  return isMobile ? `profile.html?userid=${userId}` : `PF.html?userid=${userId}`;
}

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, query, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2N41DiH0-Wjdos19dizlWSKOlkpPuOWs",
  authDomain: "ifriendmatch.firebaseapp.com",
  projectId: "ifriendmatch",
  storageBucket: "ifriendmatch.appspot.com",
  messagingSenderId: "306331636603",
  appId: "1:306331636603:web:c0ae0bd22501803995e3de",
  measurementId: "G-D96BEW6RC3"
};

const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ─── Estado global ────────────────────────────────────────────────────────────
let currentUserId  = null;
let todosUsuarios  = [];          
let preloadPronto  = false;       
let preloadPromise = null;        

// ─── Elementos ────────────────────────────────────────────────────────────────
const btnBuscar      = document.querySelector('.search-btn');
const switchIgualAMim = document.getElementById('igualAMim');
const filtrosInputs  = document.querySelectorAll('.filtros input, .filtros select');
const cardsWrapper   = document.getElementById('cardsWrapper');
const friendsList    = document.querySelector('.friends-list');

// ─── Utilitários ──────────────────────────────────────────────────────────────
function normalizar(str) {
  return (str || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function truncar(str, max = 14) {
  str = str || '';
  return str.length > max ? str.substring(0, max) + '…' : str;
}

// ─── Cache localStorage ───────────────────────────────────────────────────────
const CACHE_KEY     = 'rm_usuarios_v2';
const CACHE_TTL_MS  = 10 * 60 * 1000; 

function salvarCache(usuarios) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      data: usuarios.slice(0, 60)
    }));
  } catch (_) {}
}

function lerCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > CACHE_TTL_MS) return null; 
    return parsed.data;
  } catch (_) { return null; }
}

// ─── Montar perfil de um doc ──────────────────────────────────────────────────
async function montarUsuario(docSnap) {
  const userId   = docSnap.id;
  const userData = docSnap.data();

  const [mediaSnap, aboutSnap, likesSnap] = await Promise.all([
    getDoc(doc(db, "users", userId, "user-infos", "user-media")),
    getDoc(doc(db, "users", userId, "user-infos", "about")),
    getDoc(doc(db, "users", userId, "user-infos", "likes")),
  ]);

  const media = mediaSnap.exists() ? mediaSnap.data() : {};
  const about = aboutSnap.exists() ? aboutSnap.data() : {};
  const likes = likesSnap.exists() ? likesSnap.data() : {};

  const banner = (media.banner?.trim())
    ? media.banner
    : (media.headerphoto?.trim() ? media.headerphoto : '../public/img/bg.jpg');

  const userphoto = (media.pfp?.trim())
    ? media.pfp
    : (media.userphoto?.trim() ? media.userphoto : '../public/img/default.jpg');

  let idade = null;
  const nasc = userData.nascimento || about.nascimento;
  if (nasc) {
    idade = new Date().getFullYear() - new Date(nasc).getFullYear();
  }

  return {
    id:          userId,
    displayname: userData.displayname || userData.username || 'Usuário',
    username:    userData.username || '',
    userphoto,
    banner,
    idade,
    _perfil: { ...userData, ...media, ...about, ...likes }
  };
}

// ─── Pré-carregamento em background ───────────────────────────────────────────
async function iniciarPreload(uid) {
  const snapshot = await getDocs(query(collection(db, 'users'), limit(150)));

  const resultados = await Promise.all(
    snapshot.docs
      .filter(d => d.id !== uid)
      .map(d => montarUsuario(d).catch(() => null))
  );

  todosUsuarios = resultados.filter(Boolean);
  preloadPronto = true;
  salvarCache(todosUsuarios);

  const filtros = coletarFiltros();
  const temFiltro = Object.values(filtros).some(v => v);
  if (!temFiltro) {
    renderizarAmbos(todosUsuarios.slice(0, 40));
  }
}

onAuthStateChanged(auth, (user) => {
  if (!user) return;
  currentUserId = user.uid;
  preloadPromise = iniciarPreload(user.uid);
});


async function buscarUsuariosSemelhantes() {
  document.querySelector('.option-bar')?.classList.remove('open');
  document.querySelector('.sidebar-overlay')?.classList.remove('show');

  if (!preloadPronto) {
    mostrarLoadingLeve();
    await preloadPromise;
  }

  const filtros  = coletarFiltros();
  const temFiltro = Object.values(filtros).some(v => v);

  let resultados;
  if (!temFiltro) {
    resultados = todosUsuarios.slice(0, 40);
  } else {
    resultados = todosUsuarios
      .map(u => ({ ...u, score: calcularSimilaridadeCampos(u._perfil, filtros, u.idade) }))
      .filter(u => u.score > 0)
      .sort((a, b) => b.score - a.score);
  }

  renderizarAmbos(resultados);
}

function renderizarAmbos(lista) {
  const alertArea = document.querySelector('.alert-area');
  if (alertArea) alertArea.classList.add('hidden');
  renderizarResultados(lista);
  renderizarGrid(lista);
}

function renderizarResultados(resultados) {
  if (!cardsWrapper) return;
  cardsWrapper.innerHTML = '';
  if (!resultados.length) {
    cardsWrapper.innerHTML = '<div class="error-area"><p>Nenhum usuário parecido encontrado</p></div>';
    return;
  }
  const frag = document.createDocumentFragment();
  deduplicar(resultados).forEach(u => {
    const card = document.createElement('div');
    card.className = 'friend-card';
    card.innerHTML = `
      <div class="card-content">
        <img src="${u.userphoto}" alt="${u.displayname}" class="card-image" loading="lazy" onerror="this.src='../public/img/default.jpg'">
        <div class="card-info">
          <div class="card-username">${truncar(u.username)}</div>
        </div>
        <a href="${getProfileUrl(u.id)}" class="view-profile-btn"><p>Ver Perfil</p></a>
        ${u.score > 0 ? `<p class="similarity">Compatibilidade: ${(u.score * 100).toFixed(0)}%</p>` : ''}
      </div>`;
    frag.appendChild(card);
  });
  cardsWrapper.appendChild(frag);
}

function renderizarGrid(resultados) {
  if (!friendsList) return;
  friendsList.innerHTML = '';
  if (!resultados.length) {
    friendsList.innerHTML = '<div class="error-area"><p>Nenhum usuário parecido encontrado</p></div>';
    return;
  }
  const frag = document.createDocumentFragment();
  deduplicar(resultados).forEach(u => {
    const userEl = document.createElement('a');
    userEl.className = 'user';
    userEl.href = getProfileUrl(u.id);
    userEl.setAttribute('data-username', u.username);
    userEl.innerHTML = `
      <div class="card-media">
        <img src="${u.banner}" class="card-banner" loading="lazy" onerror="this.src='../public/img/bg.jpg'">
        <img src="${u.userphoto}" alt="${u.displayname}" class="card-image" loading="lazy" onerror="this.src='../public/img/default.jpg'">
      </div>
      <div class="user-name">
        <div class="card-info">
          <div class="profile-username"><p>${truncar(u.username)}</p></div>
        </div>
        <button class="follow-btn">Adicionar</button>
      </div>`;
    frag.appendChild(userEl);
  });
  friendsList.appendChild(frag);
}

function deduplicar(lista) {
  const vistos = new Set();
  return lista.filter(u => {
    if (vistos.has(u.id)) return false;
    vistos.add(u.id);
    return true;
  });
}

// ─── Loading leve (só aparece se o usuário clicar antes do preload terminar) ──
function mostrarLoadingLeve() {
  const html = `<div class="loading-spinner"><div class="spinner-center"><div class="spinner"></div><p>Quase lá...</p></div></div>`;
  if (cardsWrapper && !cardsWrapper.querySelector('.friend-card')) cardsWrapper.innerHTML = html;
  if (friendsList  && !friendsList.querySelector('.user'))        friendsList.innerHTML  = html;
}

// ─── Exibe cache imediatamente ao abrir a página ──────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const alertArea = document.querySelector('.alert-area');
  const optionBar = document.querySelector('.option-bar');
  const overlay   = document.querySelector('.sidebar-overlay');
  const startBtn  = document.getElementById('start-filter-btn');

  const cache = lerCache();
  if (cache && cache.length) {
    if (alertArea) alertArea.classList.add('hidden');
    renderizarAmbos(cache);
    todosUsuarios = cache;
  } else {
    if (alertArea) alertArea.classList.remove('hidden');
  }

  if (startBtn && optionBar && overlay) {
    startBtn.addEventListener('click', () => {
      optionBar.classList.add('open');
      overlay.classList.add('show');
    });
  }
});

if (btnBuscar) btnBuscar.addEventListener('click', buscarUsuariosSemelhantes);
if (switchIgualAMim) switchIgualAMim.addEventListener('change', alternarIgualAMim);

async function alternarIgualAMim() {
  if (switchIgualAMim.checked) {
    filtrosInputs.forEach(el => { el.disabled = true; el.classList.add('cinza'); });
    await preencherComDadosDoUsuarioAtual();
  } else {
    filtrosInputs.forEach(el => { el.disabled = false; el.classList.remove('cinza'); el.value = ''; });
  }
}

async function preencherComDadosDoUsuarioAtual() {
  if (!currentUserId) return;
  const [userSnap, mediaSnap, aboutSnap, likesSnap] = await Promise.all([
    getDoc(doc(db, "users", currentUserId)),
    getDoc(doc(db, "users", currentUserId, "user-infos", "user-media")),
    getDoc(doc(db, "users", currentUserId, "user-infos", "about")),
    getDoc(doc(db, "users", currentUserId, "user-infos", "likes")),
  ]);
  const userData = userSnap.exists()  ? userSnap.data()  : {};
  const media    = mediaSnap.exists() ? mediaSnap.data() : {};
  const about    = aboutSnap.exists() ? aboutSnap.data() : {};
  const likes    = likesSnap.exists() ? likesSnap.data() : {};

  filtrosInputs.forEach(input => {
    const label = input.previousElementSibling?.textContent?.toLowerCase() || '';
    if (label.includes('estilo'))       input.value = about.styles      || '';
    if (label.includes('personalidade'))input.value = about.personality || '';
    if (label.includes('medo'))         input.value = about.fears       || '';
    if (label.includes('sonho'))        input.value = about.dreams      || '';
    if (label.includes('musica'))       input.value = likes.music       || '';
    if (label.includes('personagem'))   input.value = likes.characters  || '';
    if (label.includes('hobbies'))      input.value = likes.hobbies     || '';
    if (label.includes('local'))        input.value = userData.location || userData.localizacao || '';
    if (label.includes('genero'))       input.value = userData.gender   || '';
    if (label.includes('estado civil')) input.value = userData.maritalStatus || '';
    if (label.includes('mbti'))         input.value = userData.MBTI     || userData.mbti || '';
  });
}

function coletarFiltros() {
  const filtros = {};
  filtrosInputs.forEach(el => {
    const label = el.previousElementSibling?.textContent?.trim().toLowerCase() || el.id;
    filtros[label] = el.value.trim().toLowerCase();
  });
  filtros['idade-minima'] = document.getElementById('idade-min')?.value || '';
  filtros['idade-maxima'] = document.getElementById('idade-max')?.value || '';
  return filtros;
}

function calcularSimilaridadeCampos(perfil, filtros, idade) {
  let score = 0;
  let campos = 0;

  function termosFiltro(valor) {
    if (!valor) return [];
    return valor.split(',').map(t => t.trim()).filter(Boolean).flatMap(t => t.split(' ')).filter(Boolean);
  }


  if (filtros['estilo']) {
    const termos = termosFiltro(filtros['estilo']);
    const campo = normalizar(perfil.styles || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['personalidade']) {
    const termos = termosFiltro(filtros['personalidade']);
    const campo = normalizar(perfil.personality || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['medos']) {
    const termos = termosFiltro(filtros['medos']);
    const campo = normalizar(perfil.fears || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['sonhos e desejos']) {
    const termos = termosFiltro(filtros['sonhos e desejos']);
    const campo = normalizar(perfil.dreams || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['musicas']) {
    const termos = termosFiltro(filtros['musicas']);
    const campo = normalizar(perfil.music || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['personagens']) {
    const termos = termosFiltro(filtros['personagens']);
    const campo = normalizar(perfil.characters || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['hobbies']) {
    const termos = termosFiltro(filtros['hobbies']);
    const campo = normalizar(perfil.hobbies || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['localização']) {
    const termos = termosFiltro(filtros['localização']);
    const campo = normalizar(perfil.location || perfil.localizacao || '');
    if (termos.some(t => campo.includes(normalizar(t)))) score += 2;
    campos++;
  }

  if (filtros['genero']) {
    const termos = termosFiltro(filtros['genero']);
    const campo = normalizar(perfil.gender || '');
    if (termos.some(t => campo === normalizar(t))) score += 2;
    campos++;
  }

  if (filtros['estado civil']) {
    const termos = termosFiltro(filtros['estado civil']);
    const campo = normalizar(perfil.maritalStatus || '');
    if (termos.some(t => campo === normalizar(t))) score += 2;
    campos++;
  }

  if (filtros['mbti']) {
    const termos = termosFiltro(filtros['mbti']);
    const campo = normalizar(perfil.MBTI || perfil.mbti || '');
    if (termos.some(t => campo === normalizar(t))) score += 2;
    campos++;
  }

  if (filtros['idade-minima'] || filtros['idade-maxima']) {
    const min = parseInt(filtros['idade-minima']) || 0;
    const max = parseInt(filtros['idade-maxima']) || 200;
    if (idade !== null && idade >= min && idade <= max) score += 2;
    campos++;
  }

  const palavrasFiltro = Object.values(filtros)
    .filter(Boolean)
    .flatMap(termosFiltro)
    .map(normalizar);

  const textoUsuario = [
    perfil.bio || '',
    perfil.displayname || '',
    perfil.username || '',
    perfil.name || '',
    perfil.surname || '',
    perfil.music || '',
    perfil.hobbies || '',
    perfil.characters || '',
    perfil.dreams || '',
    perfil.fears || '',
    perfil.location || '',
    perfil.localizacao || '',
    perfil.tags || '',
    perfil.books || '',
    perfil.foods || '',
    perfil.games || '',
    perfil.movies || '',
    perfil.overview || '',
    perfil.others || ''
  ].join(' ').toLowerCase();

  palavrasFiltro.forEach(palavra => {
    if (textoUsuario.includes(palavra)) score += 1;
  });

  return campos ? score / campos : 0;
}

class FriendsCarousel {
    constructor() {
        this.currentIndex = 0;
        this.users = [];
        this.cardsWrapper = document.getElementById('cardsWrapper');
        this.indicators = document.getElementById('indicators');
        this.isTransitioning = false;
    }

    setUsers(newUsers) {
        const vistos = new Set();
        this.users = newUsers.filter(u => {
            const key = u.profile || u.username;
            if (vistos.has(key)) return false;
            vistos.add(key);
            return true;
        });
        this.currentIndex = 0;
        this.createCards();
        this.createIndicators();
        this.updateDisplay();
    }

    createCards() {
        this.cardsWrapper.innerHTML = '';
        this.users.forEach((user, index) => {
            const card = document.createElement('div');
            card.className = 'friend-card';
            card.innerHTML = `
                <div class="card-content">
                    <img src="${user.image}" alt="${user.name}" class="card-image">
                    <div class="card-info">
                        <div class="card-username">${user.username}</div>
                    </div>
                    <a href="${user.profile}" class="view-profile-btn"><p>Ver Perfil</p>
                    </a>
                </div>
            `;
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.view-profile-btn')) {
                    this.goToSlide(index);
                }
            });
            this.cardsWrapper.appendChild(card);
        });
    }

    createIndicators() {
        this.indicators.innerHTML = '';
        this.users.forEach((_, index) => {
            const indicator = document.createElement('div');
            indicator.className = 'indicator';
            if (index === 0) indicator.classList.add('active');
            indicator.addEventListener('click', () => {
                this.goToSlide(index);
            });
            this.indicators.appendChild(indicator);
        });
    }

    updateDisplay() {
        const cards = this.cardsWrapper.children;
        const totalCards = cards.length;

        Array.from(cards).forEach(card => {
            card.classList.remove('center', 'left', 'right', 'far-left', 'far-right', 'hidden');
        });

        Array.from(cards).forEach((card, index) => {
            const relativePos = this.getRelativePosition(index, this.currentIndex, totalCards);
            switch (relativePos) {
                case 0: card.classList.add('center'); break;
                case 1: card.classList.add('right'); break;
                case -1: card.classList.add('left'); break;
                case 2: card.classList.add('far-right'); break;
                case -2: card.classList.add('far-left'); break;
                default: card.classList.add('hidden'); break;
            }
        });

        const indicatorElements = this.indicators.children;
        Array.from(indicatorElements).forEach((indicator, index) => {
            indicator.classList.toggle('active', index === this.currentIndex);
        });
    }

    getRelativePosition(cardIndex, currentIndex, totalCards) {
        let diff = cardIndex - currentIndex;
        if (diff > totalCards / 2) {
            diff -= totalCards;
        } else if (diff < -totalCards / 2) {
            diff += totalCards;
        }
        return diff;
    }

    goToSlide(index) {
        if (this.isTransitioning || index === this.currentIndex) return;
        this.isTransitioning = true;
        this.currentIndex = index;
        this.updateDisplay();
        setTimeout(() => {
            this.isTransitioning = false;
        }, 400);
    }

    next() {
        this.currentIndex = (this.currentIndex + 1) % this.users.length;
        this.updateDisplay();
    }

    prev() {
        this.currentIndex = (this.currentIndex - 1 + this.users.length) % this.users.length;
        this.updateDisplay();
    }

    bindEvents() {
        document.getElementById('nextBtn').addEventListener('click', () => this.next());
        document.getElementById('prevBtn').addEventListener('click', () => this.prev());
        
    }
}

async function atualizarMarqueeUltimoUsuario() {
  const lastUpdateRef = doc(db, "lastupdate", "latestUser");
  const docSnap = await getDoc(lastUpdateRef);
  const marquee = document.querySelector(".marquee");

  } else {
    marquee.textContent = "Bem-vindo ao RealMe!";
  }
}

function carregarFotoPerfil() {
  const navPic = document.getElementById('nav-pic');
  const defaultPic = '../public/img/default.jpg';

  const cachedPhoto = localStorage.getItem('user_photo_cache');
  if (cachedPhoto) {
    navPic.src = cachedPhoto;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userId = user.uid;
      try {
        const userMediaRef = doc(db, `users/${userId}/user-infos/user-media`);
        const userMediaSnap = await getDoc(userMediaRef);

        if (userMediaSnap.exists()) {
          const userPhoto = userMediaSnap.data().userphoto || defaultPic;

          if (userPhoto !== cachedPhoto) {
            navPic.src = userPhoto; 
            localStorage.setItem('user_photo_cache', userPhoto);
          }
        } else {
          navPic.src = defaultPic;
          localStorage.removeItem('user_photo_cache');
        }
      } catch (error) {
        console.error('Erro ao buscar foto:', error);
        if (!cachedPhoto) navPic.src = defaultPic;
      }
    } else {
      navPic.src = defaultPic;
      localStorage.removeItem('user_photo_cache');
    }
  });
}

document.addEventListener('DOMContentLoaded', carregarFotoPerfil);
